name: TPVG Tracker
concurrency:
  group: tpvg-tracker
  cancel-in-progress: false
on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tracker loop
        run: |
          for i in {1..24}
          do
            node data/scripts/fetch_tpvg.js || true
            sleep 20
          done

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/lokomotive.json
          git commit -m "Update TPVG data" || echo "No changes"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main || true

      - name: Trigger next run
        run: |
          gh workflow run "TPVG Tracker" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
