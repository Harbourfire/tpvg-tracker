name: TPVG Tracker

on:
  schedule:
    - cron: "* * * * *"

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1. provjera
      - name: Check TPVG (1)
        run: node data/scripts/fetch_tpvg.js

      - name: Commit (1)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/lokomotive.json
          git commit -m "Update TPVG data" || echo "No changes"
          git push

      - run: sleep 20

      # 2. provjera
      - name: Check TPVG (2)
        run: node data/scripts/fetch_tpvg.js

      - name: Commit (2)
        run: |
          git add data/lokomotive.json
          git commit -m "Update TPVG data" || echo "No changes"
          git push

      - run: sleep 20

      # 3. provjera
      - name: Check TPVG (3)
        run: node data/scripts/fetch_tpvg.js

      - name: Commit (3)
        run: |
          git add data/lokomotive.json
          git commit -m "Update TPVG data" || echo "No changes"
          git push
