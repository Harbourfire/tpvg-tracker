name: TPVG Tracker

on:
  schedule:
    - cron: "* * * * *"

  workflow_dispatch:

  push:
    branches: [ main ]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        run: node data/scripts/fetch_tpvg.js

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/lokomotive.json
          git commit -m "Update TPVG data" || echo "No changes"
          git push

      - name: Wait 30 seconds
        run: sleep 30

      - name: Trigger next run
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/Harbourfire/tpvg-tracker/actions/workflows/tracker.yml/dispatches \
          -d '{"ref":"main"}'

          
