name: TPVG Tracker

on:
  schedule:
    - cron: "* * * * *"

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tracker loop
        run: |
          for i in {1..4}
          do
            node data/scripts/fetch_tpvg.js
            sleep 15
          done

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/lokomotive.json
          git commit -m "Update TPVG data" || echo "No changes"
          git push
